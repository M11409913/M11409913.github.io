<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LecT-Scribe · 課堂逐字稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10131A;        /* 深墨底 */
    --panel:#1A1F2B;      /* 面板 */
    --panel-2:#232937;    /* 面板亮 */
    --line:#2E3648;       /* 分隔線 */
    --paper:#F7F5EF;      /* 逐字稿紙面 */
    --paper-ink:#23262E;  /* 紙上文字 */
    --paper-line:#E3DFD2; /* 紙上橫線 */
    --brand:#5B7CFA;      /* 主要動作：靛藍 */
    --brand-soft:#2A3350;
    --rec:#F0453E;        /* 錄音紅 */
    --mark:#F4C84B;       /* 螢光筆/當前段 */
    --muted:#8A93A6;      /* 次要文字 */
    --ok:#4FD1A1;
    --radius:16px;
    --shadow:0 12px 40px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 15% -10%, #1c2233 0%, var(--ink) 55%);
    color:#EAECF2;
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .mono{font-family:"Space Mono","SFMono-Regular",Consolas,monospace}

  .app{
    height:100%;
    display:grid;
    grid-template-columns: 380px 1fr;
    gap:18px;
    padding:18px;
    padding-top:max(18px,env(safe-area-inset-top));
    padding-bottom:max(18px,env(safe-area-inset-bottom));
  }
  @media (max-width:880px){
    .app{grid-template-columns:1fr; grid-template-rows:auto 1fr; overflow:auto}
    body{overflow:auto}
  }

  /* ---------- 左：控制台 ---------- */
  .panel{
    background:linear-gradient(180deg,var(--panel) 0%, #161B25 100%);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    min-height:0;
  }
  .console{padding:22px; overflow:auto; gap:20px; display:flex; flex-direction:column}

  .brand{display:flex; align-items:center; gap:12px}
  .glyph{
    width:44px;height:44px;border-radius:12px;flex:none;
    background:linear-gradient(140deg,var(--brand),#8A6BFA);
    display:grid;place-items:center;box-shadow:0 6px 20px rgba(91,124,250,.4)
  }
  .glyph svg{width:24px;height:24px}
  .brand h1{font-size:19px;font-weight:900;letter-spacing:.5px;margin:0;line-height:1.1}
  .brand p{margin:2px 0 0;font-size:11px;color:var(--muted)}
  .brand .mono{font-size:11px}

  .group label.k{display:block;font-size:12px;color:var(--muted);letter-spacing:1.5px;
    text-transform:uppercase;font-weight:700;margin-bottom:9px}

  .seg{display:flex;background:var(--panel-2);border:1px solid var(--line);
    border-radius:12px;padding:4px;gap:4px}
  .seg button{
    flex:1;border:0;background:transparent;color:#C3C9D6;
    padding:11px 6px;border-radius:9px;cursor:pointer;font-family:inherit;
    font-size:14px;font-weight:500;transition:.15s;line-height:1.25
  }
  .seg button small{display:block;font-size:10px;color:var(--muted);margin-top:3px;font-weight:400}
  .seg button[aria-pressed="true"]{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(91,124,250,.35)}
  .seg button[aria-pressed="true"] small{color:#dfe4ff}

  .toggle{display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .toggle span{font-size:14px;font-weight:500}
  .toggle span small{display:block;color:var(--muted);font-size:11px;font-weight:400;margin-top:2px}
  .switch{position:relative;width:50px;height:29px;flex:none}
  .switch input{opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .switch i{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.2s;pointer-events:none}
  .switch i::after{content:"";position:absolute;top:3px;left:3px;width:23px;height:23px;
    background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + i{background:var(--brand)}
  .switch input:checked + i::after{transform:translateX(21px)}

  /* 錄音 / 匯入區 */
  .capture{display:flex;flex-direction:column;gap:12px}
  .meter{height:58px;display:flex;align-items:flex-end;gap:3px;justify-content:center;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:10px;overflow:hidden}
  .meter i{width:5px;background:linear-gradient(180deg,var(--rec),#ff9a72);border-radius:3px;
    height:6px;transition:height .08s linear;opacity:.85}
  .meter.idle i{background:var(--line);opacity:.6}

  .btn{border:0;border-radius:13px;cursor:pointer;font-family:inherit;font-weight:700;
    font-size:15px;padding:15px;display:flex;align-items:center;justify-content:center;gap:9px;
    transition:.15s;color:#fff;width:100%}
  .btn svg{width:19px;height:19px}
  .btn.rec{background:var(--rec);box-shadow:0 6px 20px rgba(240,69,62,.35)}
  .btn.rec.on{background:#2b2f3a;color:var(--rec);border:1px solid var(--rec)}
  .btn.rec.on .dot{width:11px;height:11px;border-radius:50%;background:var(--rec);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .btn.ghost{background:var(--panel-2);border:1px solid var(--line);color:#C3C9D6;font-weight:500}
  .btn.ghost:active{background:var(--panel)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .rectime{text-align:center;font-size:13px;color:var(--muted)}

  .run{background:linear-gradient(135deg,var(--brand),#7A6BFA);box-shadow:0 8px 26px rgba(91,124,250,.4)}
  .run:disabled{background:#2b3245;box-shadow:none}

  /* 進度 */
  .prog{display:none;flex-direction:column;gap:8px}
  .prog.show{display:flex}
  .bar{height:8px;background:var(--panel-2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--brand),var(--mark));
    border-radius:6px;transition:width .3s}
  .bar.indet i{width:35%;animation:slide 1.3s infinite ease-in-out}
  @keyframes slide{0%{margin-left:-35%}100%{margin-left:100%}}
  .prog .stat{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

  .hint{font-size:11.5px;color:var(--muted);line-height:1.7;border-top:1px solid var(--line);padding-top:16px}
  .hint b{color:#C3C9D6}

  /* ---------- 右：逐字稿 ---------- */
  .sheet{display:flex;flex-direction:column;min-height:0}
  .sheet .top{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
  .sheet .top h2{margin:0;font-size:15px;font-weight:700}
  .sheet .top .badge{margin-left:auto;font-size:11px;color:var(--muted)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line)}
  .chip{border:1px solid var(--line);background:var(--panel-2);color:#C3C9D6;border-radius:10px;
    padding:9px 13px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
  .chip svg{width:15px;height:15px}
  .chip:active{background:var(--panel)}
  .chip:disabled{opacity:.4;cursor:not-allowed}

  .paper{flex:1;overflow:auto;background:var(--paper);color:var(--paper-ink);padding:8px 0}
  .paper .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#B7B09B;gap:14px;padding:40px;text-align:center}
  .paper .empty svg{width:52px;height:52px;opacity:.5}
  .paper .empty p{margin:0;font-size:14px;line-height:1.8;max-width:320px}

  .line{display:flex;gap:14px;padding:9px 26px;line-height:1.85;cursor:pointer;
    border-bottom:1px solid var(--paper-line);transition:background .15s}
  .line:hover{background:#efece1}
  .line .ts{flex:none;font-size:12px;color:#9a9078;padding-top:4px;min-width:52px;
    font-family:"Space Mono",monospace}
  .line .tx{font-size:16.5px}
  .line.active{background:linear-gradient(90deg, #fdf3c7, #faedb0)}
  .line.active .ts{color:#a68a2b;font-weight:700}

  /* 播放列 */
  .player{display:none;align-items:center;gap:14px;padding:13px 20px;border-top:1px solid var(--line);
    background:var(--panel)}
  .player.show{display:flex}
  .player button.play{width:46px;height:46px;border-radius:50%;border:0;background:var(--brand);color:#fff;
    cursor:pointer;display:grid;place-items:center;flex:none}
  .player button.play svg{width:20px;height:20px}
  .player .track{flex:1;height:6px;background:var(--panel-2);border-radius:6px;position:relative;cursor:pointer}
  .player .track i{position:absolute;left:0;top:0;height:100%;background:var(--brand);border-radius:6px;width:0}
  .player .t{font-size:12px;color:var(--muted);min-width:96px;text-align:right}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);
    background:#000;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;
    transition:.3s;pointer-events:none;z-index:50;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">

  <!-- 左：控制台 -->
  <section class="panel">
    <div class="console">
      <div class="brand">
        <div class="glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </div>
        <div>
          <h1>LecT-Scribe</h1>
          <p>課堂錄音 → 逐字稿 · <span class="mono" id="engine">本機 Whisper</span></p>
        </div>
      </div>

      <!-- 模型 -->
      <div class="group">
        <label class="k">辨識模型</label>
        <div class="seg" id="model">
          <button data-v="onnx-community/whisper-tiny" aria-pressed="false">極速<small>tiny · 最快</small></button>
          <button data-v="onnx-community/whisper-base" aria-pressed="true">均衡<small>base · 建議</small></button>
          <button data-v="onnx-community/whisper-small" aria-pressed="false">高精<small>small · 較慢</small></button>
        </div>
      </div>

      <!-- 語言 -->
      <div class="group">
        <label class="k">課堂語言</label>
        <div class="seg" id="lang">
          <button data-v="chinese" aria-pressed="true">中文</button>
          <button data-v="english" aria-pressed="false">英文</button>
          <button data-v="auto" aria-pressed="false">自動</button>
        </div>
      </div>

      <div class="toggle">
        <span>輸出繁體中文<small>Whisper 常輸出簡體，開啟自動轉台灣正體</small></span>
        <label class="switch"><input type="checkbox" id="trad" checked><i></i></label>
      </div>

      <!-- 錄音 / 匯入 -->
      <div class="group capture">
        <label class="k">音訊來源</label>
        <div class="meter idle" id="meter"></div>
        <button class="btn rec" id="recBtn"><span class="ic"></span><span class="lbl">開始錄音</span></button>
        <div class="rectime mono" id="recTime">00:00</div>
        <button class="btn ghost" id="upBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          匯入音檔
        </button>
        <input type="file" id="file" accept="audio/*,video/*" hidden>
      </div>

      <button class="btn run" id="runBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        開始轉錄
      </button>

      <div class="prog" id="prog">
        <div class="stat"><span id="progLabel">準備中</span><span id="progPct" class="mono"></span></div>
        <div class="bar" id="bar"><i></i></div>
      </div>

      <div class="hint">
        <b>首次使用</b>會下載模型（tiny≈40MB / base≈145MB），下載後存在瀏覽器離線可用。<br>
        全程在<b>本機運算</b>，音訊不會離開這台裝置。<br>
        需以 <b>https</b> 或 localhost 開啟才能使用麥克風。
      </div>
    </div>
  </section>

  <!-- 右：逐字稿 -->
  <section class="panel sheet">
    <div class="top">
      <h2>逐字稿</h2>
      <span class="badge mono" id="meta"></span>
    </div>
    <div class="actions">
      <button class="chip" id="copyBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製全文</button>
      <button class="chip" id="txtBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>下載 .txt</button>
      <button class="chip" id="srtBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="16" x2="16" y2="16"/></svg>下載字幕 .srt</button>
    </div>
    <div class="paper" id="paper">
      <div class="empty" id="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        <p>錄一段課堂，或匯入音檔，按「開始轉錄」。<br>逐字稿會逐句列在這裡，點任一句可跳到該段音訊。</p>
      </div>
    </div>
    <div class="player" id="player">
      <button class="play" id="playBtn"><svg viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg></button>
      <div class="track" id="track"><i></i></div>
      <div class="t mono" id="clock">00:00 / 00:00</div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>
<audio id="audio"></audio>

<!-- OpenCC：簡體→台灣正體 -->
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

<!-- Whisper 推論 worker（模組 worker，不需另存檔） -->
<script id="worker-src" type="text/plain">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';
env.allowLocalModels = false;

let transcriber = null;
let loadedKey = null;

self.onmessage = async (e) => {
  const msg = e.data;
  try {
    if (msg.type === 'load') {
      const key = msg.model + '|' + msg.device;
      if (loadedKey === key && transcriber) { self.postMessage({type:'ready'}); return; }
      transcriber = await pipeline('automatic-speech-recognition', msg.model, {
        device: msg.device,
        dtype: msg.device === 'webgpu' ? 'fp32' : 'q8',
        progress_callback: (p) => self.postMessage({type:'progress', data:p})
      });
      loadedKey = key;
      self.postMessage({type:'ready'});
    } else if (msg.type === 'run') {
      const out = await transcriber(msg.audio, {
        language: msg.language === 'auto' ? null : msg.language,
        task: 'transcribe',
        chunk_length_s: 30,
        stride_length_s: 5,
        return_timestamps: true
      });
      self.postMessage({type:'result', data: out});
    }
  } catch (err) {
    self.postMessage({type:'error', error: String(err && err.message || err), device: msg.device});
  }
};
</script>

<script>
/* ---------------- 狀態 ---------------- */
const $ = (s)=>document.querySelector(s);
let worker=null, workerReady=false, currentDevice=null;
let audioFloat=null;          // 16k mono Float32Array 給 Whisper
let mediaRecorder=null, recChunks=[], recStream=null, recTimer=null, recSec=0;
let analyser=null, meterRAF=null, audioCtxMeter=null;
let segments=[];              // {start,end,text}
let objectUrl=null;

const modelSeg=$('#model'), langSeg=$('#lang');
const audioEl=$('#audio');

/* ---------------- 小工具 ---------------- */
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);}
function fmt(s){s=Math.max(0,s|0);const m=(s/60|0),ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function fmtSrt(s){const ms=Math.floor((s%1)*1000);const t=Math.floor(s);const h=t/3600|0,m=(t%3600)/60|0,ss=t%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')},${String(ms).padStart(3,'0')}`;}
function segValue(seg){return seg.querySelector('[aria-pressed="true"]').dataset.v;}
function bindSeg(seg){seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
  seg.querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed','false'));
  b.setAttribute('aria-pressed','true');});}
bindSeg(modelSeg); bindSeg(langSeg);

/* ---------------- 繁簡轉換 ---------------- */
let toTrad=null;
try{ toTrad = OpenCC.Converter({from:'cn', to:'twp'}); }catch(e){ toTrad=null; }

/* ---------------- Worker ---------------- */
function makeWorker(){
  const src=$('#worker-src').textContent;
  const url=URL.createObjectURL(new Blob([src],{type:'text/javascript'}));
  const w=new Worker(url,{type:'module'});
  w.onmessage=onWorkerMsg;
  return w;
}
function onWorkerMsg(e){
  const m=e.data;
  if(m.type==='progress'){
    const d=m.data;
    if(d.status==='progress' && d.total){
      const pct=Math.round(d.loaded/d.total*100);
      setProg('下載模型 '+(d.file||''), pct, false);
    }else if(d.status==='download'||d.status==='initiate'){
      setProg('準備模型…', null, true);
    }
  }else if(m.type==='ready'){
    workerReady=true; runTranscribe();
  }else if(m.type==='result'){
    handleResult(m.data);
  }else if(m.type==='error'){
    // WebGPU 失敗 → 退回 wasm 重試
    if(m.device==='webgpu' && currentDevice==='webgpu'){
      toast('改用相容模式重新載入…');
      currentDevice='wasm'; workerReady=false;
      worker.postMessage({type:'load', model:segValue(modelSeg), device:'wasm'});
    }else{
      finishRun(); setProg('',null,false); $('#prog').classList.remove('show');
      toast('發生錯誤：'+m.error);
    }
  }
}

/* ---------------- 進度 ---------------- */
function setProg(label, pct, indet){
  const p=$('#prog'); p.classList.add('show');
  $('#progLabel').textContent=label;
  const bar=$('#bar');
  if(indet){bar.classList.add('indet');$('#progPct').textContent='';bar.querySelector('i').style.width='100%';}
  else{bar.classList.remove('indet');bar.querySelector('i').style.width=(pct||0)+'%';$('#progPct').textContent=(pct!=null?pct+'%':'');}
}

/* ---------------- 錄音 ---------------- */
$('#recBtn').onclick=async()=>{
  if(mediaRecorder && mediaRecorder.state==='recording'){ stopRec(); return; }
  try{
    recStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
  }catch(err){ toast('無法取得麥克風（需 https 且已授權）'); return; }
  recChunks=[]; mediaRecorder=new MediaRecorder(recStream);
  mediaRecorder.ondataavailable=(ev)=>{if(ev.data.size)recChunks.push(ev.data);};
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(recChunks,{type:recChunks[0]?.type||'audio/webm'});
    await loadBlob(blob,'錄音');
  };
  mediaRecorder.start();
  startMeter(recStream);
  recSec=0; $('#recTime').textContent='00:00';
  recTimer=setInterval(()=>{recSec++;$('#recTime').textContent=fmt(recSec);},1000);
  const b=$('#recBtn'); b.classList.add('on'); b.querySelector('.lbl').textContent='停止錄音';
  b.querySelector('.ic').innerHTML='<span class="dot"></span>';
};
function stopRec(){
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  clearInterval(recTimer); stopMeter();
  recStream && recStream.getTracks().forEach(t=>t.stop());
  const b=$('#recBtn'); b.classList.remove('on'); b.querySelector('.lbl').textContent='開始錄音'; b.querySelector('.ic').innerHTML='';
}

/* 音量條 */
function startMeter(stream){
  audioCtxMeter=new (window.AudioContext||window.webkitAudioContext)();
  const src=audioCtxMeter.createMediaStreamSource(stream);
  analyser=audioCtxMeter.createAnalyser(); analyser.fftSize=64;
  src.connect(analyser);
  const meter=$('#meter'); meter.classList.remove('idle'); meter.innerHTML='';
  const N=24, bars=[];
  for(let i=0;i<N;i++){const el=document.createElement('i');meter.appendChild(el);bars.push(el);}
  const data=new Uint8Array(analyser.frequencyBinCount);
  const loop=()=>{analyser.getByteFrequencyData(data);
    for(let i=0;i<N;i++){const v=data[i%data.length]/255;bars[i].style.height=(6+v*44)+'px';}
    meterRAF=requestAnimationFrame(loop);};
  loop();
}
function stopMeter(){cancelAnimationFrame(meterRAF);
  if(audioCtxMeter){audioCtxMeter.close();audioCtxMeter=null;}
  const meter=$('#meter');meter.classList.add('idle');
  meter.querySelectorAll('i').forEach(b=>b.style.height='6px');}

/* ---------------- 匯入檔案 ---------------- */
$('#upBtn').onclick=()=>$('#file').click();
$('#file').onchange=async(e)=>{const f=e.target.files[0];if(f)await loadBlob(f,f.name);};

/* 讀入 blob → 建立可播放來源 + 解碼成 16k mono */
async function loadBlob(blob, label){
  try{
    setProg('解碼音訊…',null,true);
    if(objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl=URL.createObjectURL(blob); audioEl.src=objectUrl;
    const buf=await blob.arrayBuffer();
    audioFloat=await decodeTo16k(buf.slice(0));
    $('#prog').classList.remove('show');
    $('#runBtn').disabled=false;
    $('#meta').textContent=label+' · '+fmt(audioFloat.length/16000);
    toast('已載入：'+label+'，可以開始轉錄');
  }catch(err){ $('#prog').classList.remove('show'); toast('音檔無法解碼：'+err.message); }
}
async function decodeTo16k(arrayBuffer){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const decoded=await ctx.decodeAudioData(arrayBuffer); ctx.close();
  const off=new OfflineAudioContext(1, Math.max(1,Math.ceil(decoded.duration*16000)), 16000);
  const s=off.createBufferSource(); s.buffer=decoded; s.connect(off.destination); s.start();
  const r=await off.startRendering();
  return r.getChannelData(0);
}

/* ---------------- 轉錄流程 ---------------- */
$('#runBtn').onclick=()=>{
  if(!audioFloat){toast('請先錄音或匯入音檔');return;}
  $('#runBtn').disabled=true;
  const wantGPU=!!navigator.gpu;
  currentDevice = wantGPU ? 'webgpu' : 'wasm';
  $('#engine').textContent = '本機 Whisper · '+(wantGPU?'WebGPU':'相容模式');
  if(!worker) worker=makeWorker();
  if(workerReady){ runTranscribe(); }
  else{ setProg('載入模型…',null,true); worker.postMessage({type:'load', model:segValue(modelSeg), device:currentDevice}); }
};
function runTranscribe(){
  setProg('辨識中，長音檔請耐心等候…',null,true);
  worker.postMessage({type:'run', audio:audioFloat, language:segValue(langSeg)});
}
function finishRun(){ $('#runBtn').disabled=false; }

function handleResult(out){
  $('#prog').classList.remove('show'); finishRun();
  let chunks = out.chunks && out.chunks.length ? out.chunks : [{timestamp:[0,null], text:out.text||''}];
  const useTrad = $('#trad').checked && toTrad;
  segments = chunks.map(c=>({
    start: c.timestamp?.[0] ?? 0,
    end:   c.timestamp?.[1] ?? (c.timestamp?.[0] ?? 0),
    text:  (useTrad ? toTrad(c.text) : c.text).trim()
  })).filter(s=>s.text);
  renderTranscript();
  toast('轉錄完成，共 '+segments.length+' 句');
}

function renderTranscript(){
  const paper=$('#paper');
  if(!segments.length){paper.innerHTML='';paper.appendChild($('#empty'));return;}
  paper.innerHTML='';
  segments.forEach((s,i)=>{
    const line=document.createElement('div'); line.className='line'; line.dataset.i=i;
    line.innerHTML=`<span class="ts">${fmt(s.start)}</span><span class="tx"></span>`;
    line.querySelector('.tx').textContent=s.text;
    line.onclick=()=>{ audioEl.currentTime=s.start; audioEl.play(); };
    paper.appendChild(line);
  });
  ['#copyBtn','#txtBtn','#srtBtn'].forEach(id=>$(id).disabled=false);
  $('#player').classList.add('show');
}

/* ---------------- 播放列 ---------------- */
const playBtn=$('#playBtn'), track=$('#track');
playBtn.onclick=()=>{ audioEl.paused?audioEl.play():audioEl.pause(); };
audioEl.onplay =()=>playBtn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
audioEl.onpause=()=>playBtn.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><polygon points="6 4 20 12 6 20 6 4"/></svg>';
audioEl.ontimeupdate=()=>{
  const d=audioEl.duration||0, c=audioEl.currentTime;
  track.querySelector('i').style.width=(d?c/d*100:0)+'%';
  $('#clock').textContent=fmt(c)+' / '+fmt(d);
  let act=-1; for(let i=0;i<segments.length;i++){ if(c>=segments[i].start-0.2) act=i; else break; }
  document.querySelectorAll('.line').forEach(l=>l.classList.toggle('active', +l.dataset.i===act));
  const el=document.querySelector('.line.active');
  if(el){const p=$('#paper');const r=el.getBoundingClientRect(),pr=p.getBoundingClientRect();
    if(r.top<pr.top+40||r.bottom>pr.bottom-40) el.scrollIntoView({block:'center',behavior:'smooth'});}
};
track.onclick=(e)=>{const r=track.getBoundingClientRect();audioEl.currentTime=(e.clientX-r.left)/r.width*(audioEl.duration||0);};

/* ---------------- 匯出 ---------------- */
function download(name,text){const b=new Blob([text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
$('#copyBtn').onclick=()=>{const t=segments.map(s=>s.text).join('\n');
  navigator.clipboard.writeText(t).then(()=>toast('已複製全文')).catch(()=>toast('複製失敗'));};
$('#txtBtn').onclick=()=>{const t=segments.map(s=>`[${fmt(s.start)}] ${s.text}`).join('\n');
  download('逐字稿.txt', t);};
$('#srtBtn').onclick=()=>{const t=segments.map((s,i)=>
  `${i+1}\n${fmtSrt(s.start)} --> ${fmtSrt(s.end||s.start+2)}\n${s.text}\n`).join('\n');
  download('字幕.srt', t);};
</script>
